<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:Arial, sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url("brabus-bodo-dark-5120x2880-26537.jpg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    padding:40px 20px;
}


h1{
    text-align:center;
    color:white;
    font-family:'Anton', sans-serif;
    font-size:clamp(50px,8vw,100px);
    letter-spacing:5px;
    margin-bottom:40px;
}


table{
    width:min(1000px,95%);
    margin:auto;
    border-collapse:collapse;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
}


th{
    background:rgba(255,255,255,0.15);
    color:white;
    padding:18px;
    font-size:18px;
    text-transform:uppercase;
}


td{
    color:white;
    padding:15px;
    text-align:center;
    border-top:1px solid rgba(255,255,255,0.1);
}

tr{
    transition:0.3s;
}

tr:hover{
    background:rgba(255,255,255,0.08);
}


td img{
    width:100px;
    height:140px;
    object-fit:cover;
    border-radius:10px;
}


.rating{
    font-weight:bold;
    color:#00d4ff;
}
.tombol{
    display: flex;
    justify-content: center;
    gap:15px;
    flex-wrap: wrap;
}

.balik{
    display:block;
    width:fit-content;
    margin:20px auto 0;
    padding:20px 30px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.balik:hover{
    background:#ddd;
    transform:translateY(-3px);
}

</style>
</head>
